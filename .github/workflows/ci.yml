name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript tests with coverage
        run: npx jest --coverage --silent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r chronicle2layout/requirements.txt
          pip install pytest pytest-cov hypothesis

      - name: Python tests with coverage
        run: pytest --cov=chronicle2layout/src --cov-report=xml:coverage-python.xml chronicle2layout/tests/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
