name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: foundry-version
    attributes:
      label: Foundry VTT Version
      description: "Found in Settings → About (e.g., 13.331 or 14.340)"
      placeholder: "14.340"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module Version
      description: "Found in Settings → Manage Modules (e.g., 1.3.0)"
      placeholder: "1.3.0"
    validations:
      required: true

  - type: dropdown
    id: game-system
    attributes:
      label: Game System
      description: Which game system are you using?
      options:
        - PF2e (Pathfinder 2e)
        - SF2e (Starfinder 2e)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: "When I click Generate Chronicles, nothing happens and no error appears."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      value: |
        1. Open the party sheet
        2. Go to the Society tab
        3. Fill in ...
        4. Click ...
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: console-errors
    attributes:
      label: Console Errors
      description: "Open the browser console (F12 → Console tab) and paste any errors with the `[PFS Chronicle]` prefix."
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (other modules installed, hosting setup, etc.).
